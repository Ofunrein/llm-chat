<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="shell">
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="url(#grad)" stroke-width="1.5" fill="none"/>
          <circle cx="14" cy="14" r="4" fill="url(#grad)"/>
          <defs>
            <linearGradient id="grad" x1="2" y1="2" x2="26" y2="26" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">LLM Chat</span>
      </div>
      <div class="model-badge">
        <span class="dot"></span>
        <span id="model-label">claude-sonnet-4-6</span>
      </div>
    </header>

    <main class="chat-area" id="chat-area">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✦</div>
        <h1>How can I help you?</h1>
        <p>Ask anything — text, code, or drop an image below.</p>
        <div class="chips">
          <button class="chip" data-prompt="Explain attention mechanisms in transformers.">Attention mechanisms</button>
          <button class="chip" data-prompt="Write a Python async generator with type hints.">Python async gen</button>
          <button class="chip" data-prompt="What's the CAP theorem? Give a real-world example.">CAP theorem</button>
          <button class="chip" data-prompt="Describe this image in detail." data-image>Analyze an image</button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
    </main>

    <footer class="input-bar">
      <div class="image-preview-wrap" id="image-preview-wrap" style="display:none">
        <img id="image-preview" alt="preview" />
        <button class="remove-img" id="remove-img" title="Remove image">✕</button>
      </div>
      <div class="input-row">
        <label class="attach-btn" for="file-input" title="Attach image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </label>
        <input type="file" id="file-input" accept="image/*" style="display:none" />
        <textarea
          id="msg-input"
          placeholder="Message…"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
