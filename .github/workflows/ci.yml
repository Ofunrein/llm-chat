name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install deps (torch CPU from whl index)
        run: |
          uv venv
          uv pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          uv pip install "fastapi>=0.115" "uvicorn[standard]>=0.30" \
            "tiktoken>=0.7" "transformers>=4.40,<5.0" "python-dotenv>=1.0" \
            "numpy>=1.26" "pytest>=9.0" "pytest-asyncio>=0.23" \
            "httpx>=0.28" "ruff>=0.5"

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Lint
        run: uv run ruff check . --select E,F,W,I --ignore E501
